<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudVault — Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body>

  <div class="auth-bg">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Logo -->
      <a href="#" class="brand">
        <div class="brand-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
            <path d="M20 17.58A5 5 0 0018 8h-1.26A8 8 0 104 15.25"/>
            <polyline points="16 16 12 12 8 16"/>
            <line x1="12" y1="12" x2="12" y2="21"/>
          </svg>
        </div>
        <span>CloudVault</span>
      </a>

      <h1>Create your account</h1>
      <p class="subtitle">Join CloudVault — 5 GB free, forever</p>

      <!-- Error box -->
      <div class="error-box hidden" id="error-box">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="error-msg"></span>
      </div>

      <!-- Full name -->
      <div class="field">
        <label for="fullname">Full Name</label>
        <div class="input-box">
          <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" id="fullname" placeholder="Your full name" autocomplete="name" />
        </div>
      </div>

      <!-- Email -->
      <div class="field">
        <label for="email">Email address</label>
        <div class="input-box">
          <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
        </div>
      </div>

      <!-- Password -->
      <div class="field">
        <label for="password">Password</label>
        <div class="input-box">
          <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <input type="password" id="password" placeholder="At least 6 characters" autocomplete="new-password" />
          <button class="eye-btn" id="eye-btn" type="button" tabindex="-1">
            <svg id="eye-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <!-- Password strength bar -->
        <div class="strength-wrap">
          <div class="strength-bar">
            <div class="strength-fill" id="strength-fill"></div>
          </div>
          <span class="strength-label" id="strength-label"></span>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="field">
        <label for="confirm">Confirm Password</label>
        <div class="input-box">
          <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <input type="password" id="confirm" placeholder="Repeat your password" autocomplete="new-password" />
          <span class="match-icon hidden" id="match-icon">✓</span>
        </div>
      </div>

      <!-- Terms checkbox -->
      <label class="checkbox-row">
        <input type="checkbox" id="terms-check" />
        <span class="checkbox-box"></span>
        <span class="checkbox-label">
          I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
        </span>
      </label>

      <!-- Submit -->
      <button class="submit-btn" id="signup-btn">
        <span id="btn-text">Create Account</span>
        <svg id="btn-spinner" class="spinner hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
      </button>

      <!-- Divider -->
      <div class="divider"><span>or</span></div>

      <!-- Google -->
      <button class="google-btn" id="google-btn">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign up with Google
      </button>

      <!-- Switch to login -->
      <p class="switch-text">
        Already have an account?
        <a href="login.html">Sign in</a>
      </p>

    </div>

    <!-- Right side graphic -->
    <div class="auth-graphic">
      <div class="graphic-card">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="1.2">
          <path d="M20 17.58A5 5 0 0018 8h-1.26A8 8 0 104 15.25"/>
          <polyline points="16 16 12 12 8 16"/>
          <line x1="12" y1="12" x2="12" y2="21"/>
        </svg>
        <h2>Start for free today.</h2>
        <p>Everything you need to store and manage your files securely in one place.</p>
        <div class="feature-list">
          <div class="feature-item">
            <span class="feature-dot"></span>
            5 GB free storage
          </div>
          <div class="feature-item">
            <span class="feature-dot"></span>
            Upload any file type
          </div>
          <div class="feature-item">
            <span class="feature-dot"></span>
            Folders & organization
          </div>
          <div class="feature-item">
            <span class="feature-dot"></span>
            No credit card needed
          </div>
        </div>
      </div>
    </div>

  </div>

  <script type="module" src="signup.js"></script>
</body>
</html>
